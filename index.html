<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>효소 반응 RGB 데이터 분석기 (Ultimate 버전)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f8f9fa;
            padding: 20px;
            color: #333;
        }
        h2 { color: #2c3e50; }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin-top: 20px;
        }
        .left-panel {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            flex: 1;
            min-width: 350px;
            align-self: flex-start;
            position: sticky;
            top: 20px;
        }
        .right-panel {
            background: transparent;
            flex: 1.5;
            min-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .chart-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .chart-header h4 { margin: 0; }
        
        canvas {
            border: 1px dashed #aaa;
            cursor: crosshair; 
            max-width: 100%;
            border-radius: 5px;
            background-color: white;
        }
        canvas.chart-canvas {
            border: none;
            cursor: default;
        }

        .controls {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #e3f2fd;
            border-radius: 8px;
            border: 1px solid #90caf9;
        }
        .controls input[type="file"] { margin-bottom: 15px; display: block; }
        .btn {
            padding: 8px 15px;
            margin-right: 5px;
            margin-bottom: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; color: #666; }
        .btn-undo { background-color: #ffc107; color: #000; }
        .btn-undo:hover:not(:disabled) { background-color: #e0a800; }
        .btn-reset { background-color: #dc3545; color: #fff; }
        .btn-reset:hover { background-color: #c82333; }
        .btn-download { background-color: #28a745; color: #fff; }
        .btn-download:hover:not(:disabled) { background-color: #218838; }
        .btn-download-all { background-color: #17a2b8; color: #fff; width: 100%; font-size: 16px; padding: 15px; }
        .btn-download-all:hover:not(:disabled) { background-color: #138496; }
        
        .instruction {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 5px;
            font-size: 14px;
        }
        #dataLog {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-size: 14px;
            line-height: 1.6;
        }
        .time-setting {
            font-weight: bold;
            margin-bottom: 10px;
            color: #0056b3;
        }
        .time-setting input {
            width: 50px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>🧪 효소 반응 RGB 분석</h2>
    <div class="instruction">
        <strong>[사용 방법]</strong><br>
        1. <b>촬영 간격(분)</b>을 설정하고 사진을 모두 업로드하세요.<br>
        2. 이미지의 시험관 중앙을 클릭하면 R, G, B 세 가지 그래프가 동시에 실시간으로 그려집니다.<br>
        3. 우측 상단의 <b>[일괄 다운로드]</b>를 누르면 3개의 그래프가 한 번에 저장됩니다.
    </div>

    <div class="container">
        <div class="left-panel">
            <div class="controls">
                <div class="time-setting">
                    <label for="intervalInput">⏱️ 사진 1장당 촬영 간격: </label>
                    <input type="number" id="intervalInput" value="1" min="1"> 분
                </div>
                <input type="file" id="imageInput" accept="image/*" multiple>
                
                <button id="undoBtn" class="btn btn-undo" disabled>↩ 이전 사진 (실행 취소)</button>
                <button id="resetBtn" class="btn btn-reset">🔄 처음부터 다시 하기</button>
            </div>
            
            <h3 id="imageStatus" style="color: #007bff;">사진을 업로드해주세요</h3>
            <canvas id="imageCanvas"></canvas>
            
            <div id="dataLog" style="margin-top: 20px;"></div>
        </div>

        <div class="right-panel">
            <button id="downloadAllBtn" class="btn btn-download-all" disabled>📥 R, G, B 그래프 모두 한 번에 저장하기</button>

            <div class="chart-box">
                <div class="chart-header">
                    <h4 style="color: #dc3545;">🔴 R (Red) 변화</h4>
                    <button class="btn btn-download btn-sm single-dl-btn" data-target="chartR" data-name="Red_Graph" disabled>R그래프 저장</button>
                </div>
                <canvas id="chartR" class="chart-canvas"></canvas>
            </div>

            <div class="chart-box">
                <div class="chart-header">
                    <h4 style="color: #28a745;">🟢 G (Green) 변화</h4>
                    <button class="btn btn-download btn-sm single-dl-btn" data-target="chartG" data-name="Green_Graph" disabled>G그래프 저장</button>
                </div>
                <canvas id="chartG" class="chart-canvas"></canvas>
            </div>

            <div class="chart-box">
                <div class="chart-header">
                    <h4 style="color: #007bff;">🔵 B (Blue) 변화</h4>
                    <button class="btn btn-download btn-sm single-dl-btn" data-target="chartB" data-name="Blue_Graph" disabled>B그래프 저장</button>
                </div>
                <canvas id="chartB" class="chart-canvas"></canvas>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('imageInput');
        const intervalInput = document.getElementById('intervalInput');
        const canvas = document.getElementById('imageCanvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('imageStatus');
        const dataLog = document.getElementById('dataLog');
        
        const undoBtn = document.getElementById('undoBtn');
        const resetBtn = document.getElementById('resetBtn');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const singleDlBtns = document.querySelectorAll('.single-dl-btn');

        let images = [];
        let currentIndex = 0;
        let records = []; 
        
        // 3개의 차트 객체를 담을 변수
        let chartR = null;
        let chartG = null;
        let chartB = null;

        // 배경 흰색 플러그인
        const customCanvasBackgroundColor = {
            id: 'customCanvasBackgroundColor',
            beforeDraw: (chart, args, options) => {
                const {ctx} = chart;
                ctx.save();
                ctx.globalCompositeOperation = 'destination-over';
                ctx.fillStyle = options.color || '#ffffff';
                ctx.fillRect(0, 0, chart.width, chart.height);
                ctx.restore();
            }
        };

        // 데이터 숫자 표시 플러그인
        const dataLabelsPlugin = {
            id: 'dataLabelsPlugin',
            afterDatasetsDraw(chart, args, pluginOptions) {
                const { ctx } = chart;
                chart.data.datasets.forEach((dataset, i) => {
                    const meta = chart.getDatasetMeta(i);
                    if (!meta.hidden) {
                        meta.data.forEach((element, index) => {
                            ctx.fillStyle = '#2c3e50';
                            ctx.font = 'bold 13px "Malgun Gothic", sans-serif';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'bottom';
                            const dataString = dataset.data[index].toString();
                            ctx.fillText(dataString, element.x, element.y - 12);
                        });
                    }
                });
            }
        };

        input.addEventListener('change', (e) => {
            if(e.target.files.length === 0) return;
            images = Array.from(e.target.files);
            startProcess();
        });

        function startProcess() {
            currentIndex = 0;
            records = [];
            intervalInput.disabled = true; 
            
            if(chartR) { chartR.destroy(); chartR = null; }
            if(chartG) { chartG.destroy(); chartG = null; }
            if(chartB) { chartB.destroy(); chartB = null; }
            
            updateLogAndButtons();
            loadNextImage();
        }

        resetBtn.addEventListener('click', () => {
            input.value = ""; 
            images = [];
            currentIndex = 0;
            records = [];
            intervalInput.disabled = false;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            status.innerText = "사진을 업로드해주세요";
            status.style.color = "#007bff";
            
            if(chartR) { chartR.destroy(); chartR = null; }
            if(chartG) { chartG.destroy(); chartG = null; }
            if(chartB) { chartB.destroy(); chartB = null; }
            updateLogAndButtons();
        });

        undoBtn.addEventListener('click', () => {
            if(records.length > 0) {
                records.pop(); 
                currentIndex--; 
                updateLogAndButtons();
                updateAllCharts();
                loadNextImage(); 
            }
        });

        function loadNextImage() {
            if (currentIndex >= images.length) {
                status.innerText = "✅ 모든 사진 분석이 완료되었습니다!";
                status.style.color = "#28a745";
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.font = "bold 24px 'Malgun Gothic'";
                ctx.fillStyle = "#666";
                ctx.textAlign = "center";
                ctx.fillText("분석 종료", canvas.width/2, canvas.height/2);
                return;
            }

            const currentMin = currentIndex * parseInt(intervalInput.value);
            status.innerText = `[${currentMin}분 경과 사진] 시험관을 클릭하세요.`;
            status.style.color = "#dc3545";
            
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    canvas.width = img.width > 600 ? 600 : img.width;
                    canvas.height = img.height * (canvas.width / img.width);
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(images[currentIndex]);
        }

        canvas.addEventListener('click', (e) => {
            if(currentIndex >= images.length) return;

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);

            const pixel = ctx.getImageData(Math.round(x), Math.round(y), 1, 1).data;
            const timeVal = currentIndex * parseInt(intervalInput.value);

            records.push({
                timeLabel: `${timeVal}분`,
                r: pixel[0],
                g: pixel[1],
                b: pixel[2]
            });

            currentIndex++;
            updateLogAndButtons();
            updateAllCharts();
            loadNextImage();
        });

        function updateLogAndButtons() {
            dataLog.innerHTML = "<h4>📝 추출된 데이터 로그</h4>";
            records.forEach(rec => {
                dataLog.innerHTML += `시간: <b>${rec.timeLabel}</b> | <span style="color:#dc3545; font-weight:bold;">R: ${rec.r}</span>, <span style="color:#28a745; font-weight:bold;">G: ${rec.g}</span>, <span style="color:#007bff; font-weight:bold;">B: ${rec.b}</span><br>`;
            });

            const hasData = records.length > 0;
            undoBtn.disabled = !hasData;
            downloadAllBtn.disabled = !hasData;
            singleDlBtns.forEach(btn => btn.disabled = !hasData);
        }

        // 공통 차트 생성 함수
        function createOrUpdateChart(chartObj, canvasId, labels, data, labelName, colorHex) {
            if(chartObj) {
                chartObj.data.labels = labels;
                chartObj.data.datasets[0].data = data;
                chartObj.update();
                return chartObj;
            } else {
                const ctxChart = document.getElementById(canvasId).getContext('2d');
                return new Chart(ctxChart, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: labelName,
                            data: data,
                            borderColor: colorHex,
                            backgroundColor: colorHex + '33', // 투명도 추가
                            borderWidth: 2,
                            pointRadius: 6,
                            pointHoverRadius: 8,
                            pointBackgroundColor: colorHex,
                            fill: true,
                            tension: 0.1
                        }]
                    },
                    options: {
                        responsive: true,
                        layout: { padding: { top: 25 } },
                        plugins: {
                            customCanvasBackgroundColor: { color: 'white' }
                        },
                        scales: {
                            y: { 
                                beginAtZero: true, 
                                max: 255,
                                title: { display: true, text: '픽셀 값 (0~255)', font: {weight: 'bold'} }
                            },
                            x: {
                                title: { display: true, text: '경과 시간', font: {weight: 'bold'} }
                            }
                        }
                    },
                    plugins: [customCanvasBackgroundColor, dataLabelsPlugin] 
                });
            }
        }

        function updateAllCharts() {
            const labels = records.map(r => r.timeLabel);
            const rData = records.map(r => r.r);
            const gData = records.map(r => r.g);
            const bData = records.map(r => r.b);

            chartR = createOrUpdateChart(chartR, 'chartR', labels, rData, 'Red 변화량', '#dc3545');
            chartG = createOrUpdateChart(chartG, 'chartG', labels, gData, 'Green 변화량', '#28a745');
            chartB = createOrUpdateChart(chartB, 'chartB', labels, bData, 'Blue 변화량', '#007bff');
        }

        // 개별 다운로드 함수
        function downloadCanvasAsImage(canvasId, fileName) {
            const chartCanvas = document.getElementById(canvasId);
            if(!chartCanvas) return;
            const imgURL = chartCanvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.href = imgURL;
            link.download = fileName + '.png';
            link.click();
        }

        // 개별 다운로드 버튼 이벤트 연결
        singleDlBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const targetCanvas = e.target.getAttribute('data-target');
                const name = e.target.getAttribute('data-name');
                downloadCanvasAsImage(targetCanvas, name);
            });
        });

        // 일괄 다운로드 버튼 이벤트 (시간차를 두어 브라우저 팝업 차단 방지)
        downloadAllBtn.addEventListener('click', () => {
            if(!chartR || !chartG || !chartB) return;
            
            // 0.5초 간격으로 순차 다운로드 실행
            setTimeout(() => downloadCanvasAsImage('chartR', '1_Red_Graph'), 0);
            setTimeout(() => downloadCanvasAsImage('chartG', '2_Green_Graph'), 500);
            setTimeout(() => downloadCanvasAsImage('chartB', '3_Blue_Graph'), 1000);
        });
    </script>
</body>
</html>
